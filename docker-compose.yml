version: '3.8'

services:

  postgres:
    build: ./postgres
    container_name: emoji-chat-postgres
    environment:
      POSTGRES_DB: emoji_chat
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d emoji_chat"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: emoji-chat-backend
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/emoji_chat
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./emoji.json:/app/emoji.json:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: emoji-chat-frontend
    environment:
      - VITE_API_URL=http://localhost:3000
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: emoji-chat-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - postgres
    restart: unless-stopped

  nginx:
    build: ./nginx
    container_name: emoji-chat-nginx
    ports:
      - "1234:80"
    volumes:
      - ./img-apple-160:/usr/share/nginx/html/images:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
