version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-emoji
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  app:
    build: .
    container_name: emoji-siglip-app
    ports:
      - "8015:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - PYTHONUNBUFFERED=1
    volumes:
      - ./app:/app/app
      - ./img-apple-160:/app/img-apple-160:ro
      - ./emoji.json:/app/emoji.json:ro
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - qdrant
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: emoji-chat-postgres
    environment:
      POSTGRES_DB: emoji_chat
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d emoji_chat"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: emoji-chat-backend
    environment:
      DATABASE_URL: postgresql://app:${DB_PASSWORD}@postgres:5432/emoji_chat
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./emoji.json:/app/emoji.json:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: emoji-chat-frontend
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: emoji-chat-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - postgres
    restart: unless-stopped

  nginx:
    build: ./nginx
    container_name: emoji-chat-nginx
    ports:
      - "1234:80"
    volumes:
      - ./img-apple-160:/usr/share/nginx/html/images:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  qdrant_storage:
  hf_cache:
  postgres_data:
  grafana_data:
