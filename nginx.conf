events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 100M;
    
    # --- CORS Whitelist ---
    map $http_origin $cors_origin {
        default "";
        "~^http://localhost(:\d+)?$" $http_origin;
        "~^https?://truehue\.artmaxstudio\.ro$" $http_origin;
        "~^https?://truehue\.ro$" $http_origin;
        "~^https?://www\.truehue\.ro$" $http_origin;
        "~^https?://.*\.artmaxstudio\.ro$" $http_origin;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      "";
    }
    
    # Determine the protocol: Use Cloudflare's header if present, else local scheme
    map $http_x_forwarded_proto $server_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    # Determine Content-Disposition based on file extension
    map $uri $disposition_type {
        default                                             "";
        ~*\.(pdf|doc|docx|xls|xlsx|ppt|pptx|txt|csv|zip)$   "attachment";
    }

    # Performance: Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Timeouts to prevent Cloudflare 502/504 errors
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # DNS Resolver for Docker (127.0.0.11)
    resolver 127.0.0.11 valid=30s;

    upstream frontend-node {
        server truhue-frontend-web:3000;
    }

    upstream minio-s3 {
        server seaweedfs-s3:8333;
    }

    upstream backend-api {
        server backend:8000;
    }

    # --- MINIO API (for mc client and S3 sync) ---
    server {
        listen 80;
        server_name minio.truehue.ro;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://minio-s3;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Power Sync Settings
            proxy_connect_timeout 600;
            proxy_send_timeout 600;
            proxy_read_timeout 600;
            proxy_request_buffering off;
            proxy_buffering off;
            client_max_body_size 0;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
        }
    }

    # --- MINIO CONSOLE (for the Web UI) ---
    server {
        listen 80;
        server_name minio-console.truehue.ro;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            proxy_pass http://truhue-minio-storage:9001;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # --- MAIN APP SERVER ---
    server {
        listen 80 default_server;
        server_name _;
        
        # Certbot Challenge (SSL Verification)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Backend: Static Files (Cached)
        location /static/ {
            proxy_pass http://backend-api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            include /etc/nginx/security_headers.conf;
        }

        # MinIO: Serve Images (Matches /artworks/ and /staging/)
        location ~ ^/(artworks|staging)/ {
            proxy_pass http://minio-s3;
            proxy_set_header Host seaweedfs-s3:8333;

            # MinIO Robustness: Prevent connection drops
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
            
            # Production: Cache images for 30 days
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            
            # CORS: Prevent duplicates from upstream (MinIO)
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            add_header Content-Disposition $disposition_type;
            include /etc/nginx/security_headers.conf;
        }

        # Backend: API, Admin (No Cache) - Prioritize these over media patterns
        location ~ ^/(api|admin)/ {
            proxy_pass http://backend-api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            
            # Ensure backend sends uncompressed JSON so we can modify it
            proxy_set_header Accept-Encoding "";

            include /etc/nginx/security_headers.conf;

            # CORS: Allow cross-origin API calls (Port 3001 -> Port 80 Gateway)
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Accept, Authorization, Cache-Control, Content-Type, DNT, If-Modified-Since, Keep-Alive, Origin, User-Agent, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;

            # Handle OPTIONS for Preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Accept, Authorization, Cache-Control, Content-Type, DNT, If-Modified-Since, Keep-Alive, Origin, User-Agent, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            # Fix: Rewrite localhost/internal URLs in JSON responses to simulation gateway
            # sub_filter 'http://localhost:9000/artworks' 'http://localhost:8080/artworks';
            # sub_filter 'http://minio:9000/artworks' 'http://localhost:8080/artworks';
            # sub_filter 'http://localhost:9000/staging' 'http://localhost:8080/staging';
            # sub_filter 'http://minio:9000/staging' 'http://localhost:8080/staging';
            # sub_filter_once off;
            # sub_filter_types application/json;
        }

        # Transcription Service
        location /voice/ {
            proxy_pass http://truhue-voice-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Allow large model downloads
            client_max_body_size 1000M;
            
            include /etc/nginx/security_headers.conf;
        }

        # Frontend: Next.js (Catch-all)
        location / {
            proxy_pass http://frontend-node;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for Next.js HMR
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Fix Mixed Content: Force browsers to load HTTP images as HTTPS
            # add_header Content-Security-Policy "upgrade-insecure-requests";
            include /etc/nginx/security_headers.conf;
        }
    }

    # --- EMOJI LOCATION CHAT PROXY ---
    server {
        listen 80;
        server_name berra.artmaxstudio.ro;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $server_proto;

        # WebSocket: real-time emoji drops, chat, and presence
        location /ws {
            proxy_pass http://172.18.0.1:1234;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_buffering off;
        }

        # API: auth, drops, location, chat
        location /api/ {
            proxy_pass http://172.18.0.1:1234;
        }

        location /images/ {
            proxy_pass http://172.18.0.1:1234;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Frontend catch-all
        location / {
            proxy_pass http://172.18.0.1:1234;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}